<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <defs>
    <!-- Glowing effect -->
    <filter id="green-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .bg { fill: #070707; stroke: #1db954; stroke-width: 1.5; filter: url(#green-glow); }
      .title { font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; font-size: 13px; font-weight: bold; fill: #ffffff; }
      .artist { font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #a7a7a7; }
      .status { font-family: 'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif; font-size: 9px; font-weight: bold; fill: #1db954; letter-spacing: 2px; }
      .bar-bg { fill: #2c2c2c; }
      .bar-fill { fill: #1db954; filter: url(#green-glow); }
      .time { font-family: monospace; font-size: 9px; fill: #a7a7a7; }
      .control-icon { fill: #ffffff; opacity: 0.8; }
    </style>
  </defs>

  <!-- Player Background -->
  <rect x="5" y="5" width="410" height="90" rx="10" class="bg" />

  <!-- Album Art (Glowing Vinyl Record) -->
  <g transform="translate(20, 18)">
    <rect width="64" height="64" rx="6" fill="#121212" stroke="#2c2c2c" stroke-width="1" />
    <circle cx="32" cy="32" r="22" fill="#181818" stroke="#333" stroke-width="2" />
    <circle cx="32" cy="32" r="14" fill="#090909" stroke="#1db954" stroke-width="0.5" />
    <circle cx="32" cy="32" r="6" fill="#1db954" />
    <circle cx="32" cy="32" r="18" fill="none" stroke="#2c2c2c" stroke-dasharray="10 5" opacity="0.5" />
  </g>

  <!-- Track Details -->
  <g transform="translate(100, 28)">
    <text x="0" y="0" class="status">NOW PLAYING</text>
    <text x="0" y="16" class="title">Lo-Fi Coding Session</text>
    <text x="0" y="30" class="artist">Spotify Playlist</text>
  </g>

  <!-- Controls & Progress (Right Side) -->
  <g transform="translate(255, 20)">
    <!-- Play Controls -->
    <!-- Prev -->
    <path d="M10 16 L2 22 L2 10 Z M2 10 L2 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" class="control-icon" />
    <!-- Play/Pause -->
    <rect x="24" y="10" width="3" height="12" rx="1" class="control-icon" fill="#1db954" style="filter: url(#green-glow);" />
    <rect x="31" y="10" width="3" height="12" rx="1" class="control-icon" fill="#1db954" style="filter: url(#green-glow);" />
    <!-- Next -->
    <path d="M46 16 L54 10 L54 22 Z M54 10 L54 22" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none" class="control-icon" />

    <!-- Progress Bar -->
    <g transform="translate(-10, 36)">
      <rect width="145" height="4" rx="2" class="bar-bg" />
      <rect width="90" height="4" rx="2" class="bar-fill" />
      <circle cx="90" cy="2" r="3" fill="#ffffff" />
      
      <!-- Time stamps -->
      <text x="0" y="14" class="time">02:14</text>
      <text x="145" y="14" class="time" text-anchor="end">03:45</text>
    </g>
  </g>

  <!-- Spotify Brand Logo -->
  <g transform="translate(378, 15)" opacity="0.8">
    <path d="M10 0C4.477 0 0 4.477 0 10s4.477 10 10 10 10-4.477 10-10S15.523 0 10 0zm4.586 14.424c-.18.295-.565.387-.86.207-2.377-1.454-5.37-1.785-8.893-.983-.336.075-.67-.138-.746-.474-.075-.335.138-.67.475-.745 3.856-.88 7.15-.506 9.818 1.13.296.18.387.563.206.865zm1.224-2.723c-.227.368-.712.49-1.08.262-2.72-1.67-6.87-2.155-10.08-1.18-.413.125-.85-.107-.975-.52-.125-.413.107-.85.52-.975 3.66-1.11 8.23-.57 11.36 1.34.367.227.49.712.262 1.08zm.106-2.825C14.39 8.81 8.57 8.62 5.2 9.642c-.524.16-1.077-.137-1.237-.662-.16-.524.138-1.077.662-1.237 3.87-1.173 10.3-0.957 14.36 1.454.47.28.625.892.344 1.363-.28.47-.893.626-1.363.344z" fill="#1db954" />
  </g>
</svg>
